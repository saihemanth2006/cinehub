name: cinehubapp
description: "CineHub - AI-powered filmmaking platform for Android"
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.17
  iconsax: ^0.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Data / Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  fpdart: ^1.1.0

  # Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  equatable: ^2.0.7

  # Device Preview (dev builds — Android device frames)
  device_preview: ^1.2.0

  # Android-specific
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  flutter_native_splash: ^2.4.6

  # File picker for video selection
  file_picker: ^8.0.0

  # Video player for playback
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

# ─── Native Splash Screen ──────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#08080D"
  android: true
  ios: false
  web: false
  android_12:
    color: "#08080D"
    icon_background_color: "#08080D"

# ─── Android-Only Platform ─────────────────────────────────────
# This project targets Android exclusively.
# iOS, web, Linux, macOS, and Windows directories have been removed.
